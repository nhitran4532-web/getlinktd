name: Auto Update Link M3U8
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python robot.py

      - name: Push MT.json
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto update link m3u8"
          file_pattern: 'MT.json'
